name: Planka DEV
version: "dev-26.3.5.1"
slug: dev-planka
panel_icon: "mdi:view-week"
description: Kanban board open-source (Planka)
url: https://github.com/LeGitHubDeTai/ha_addons/tree/main/planka
webui: http://[HOST]:[PORT:1337]/
image: ghcr.io/legithubdetai/ha_addons/dev-planka-{arch}
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 1338
ports:
    1337/tcp: 1337
ports_description:
    1337/tcp: WebUI
options:
    DATABASE:
      db_host: localhost
      db_port: 5432
      db_user: planka
      db_password: homeassistant
      db_name: planka
    ADMIN:
      email: admin@example.com
      password: homeassistant
      name: Admin
schema:
    DATABASE:
      db_host: str
      db_port: int
      db_user: str
      db_password: str
      db_name: str
    ADMIN:
      email: str
      password: password
      name: str
map:
  - addon_config: rw
  - data: rw
