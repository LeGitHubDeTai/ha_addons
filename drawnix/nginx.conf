worker_processes  1;
error_log /dev/stdout info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 7200;
        listen 7201;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Handle assets specifically with proper MIME types
        location /assets/ {
            add_header Access-Control-Allow-Origin "*";
            
            # Force MIME types for CSS files
            location ~* \.css$ {
                add_header Content-Type "text/css; charset=utf-8" always;
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
                try_files $uri =404;
            }
        }
        
        # Fallback for CSS/JS files anywhere
        location ~* \.(css)$ {
            add_header Content-Type "text/css; charset=utf-8" always;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }
        
        location ~* \.(js)$ {
            add_header Content-Type "application/javascript; charset=utf-8" always;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }
        
        # Handle all other requests - serve files or fallback to index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Access-Control-Allow-Origin "*";
        }
    }
}
