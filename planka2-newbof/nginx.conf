user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upstream to Planka
    upstream planka_backend {
        server 127.0.0.1:1337;
    }

    server {
        listen 1338;
        server_name localhost;

        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;

        # Main proxy to Planka backend
        location / {
            proxy_pass http://planka_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Serve static files directly with proper MIME types
        location ~* ^/assets/ {
            root /opt/planka/client/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
            
            # Force correct MIME types
            location ~* \.js$ {
                add_header Content-Type "application/javascript; charset=utf-8" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.css$ {
                add_header Content-Type "text/css; charset=utf-8" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
        }

        # Serve other static files directly
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            root /opt/planka/client/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
            
            # Force correct MIME types
            location ~* \.js$ {
                add_header Content-Type "application/javascript; charset=utf-8" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.css$ {
                add_header Content-Type "text/css; charset=utf-8" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.png$ {
                add_header Content-Type "image/png" always;
            }
            location ~* \.jpg$ {
                add_header Content-Type "image/jpeg" always;
            }
            location ~* \.svg$ {
                add_header Content-Type "image/svg+xml" always;
            }
        }

        # WebSocket support for Socket.IO
        location ~* \.io {
            proxy_pass http://planka_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }

        # API routes
        location ~ ^/(api|v1)/ {
            proxy_pass http://planka_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
