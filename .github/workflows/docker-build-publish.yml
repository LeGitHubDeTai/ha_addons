name: Docker Build and Publish

on:
  push:
    branches: [ main, actions-dev, planka-dev ]
    paths:
      - '**/config.yaml'
      - '**/Dockerfile'
      - '**/build.yaml'
      - '**/root/**'
  pull_request:
    branches: [ main ]
    paths:
      - '**/config.yaml'
      - '**/Dockerfile'
      - '**/build.yaml'
      - '**/root/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: legithubdetai
  REPO_PREFIX: ha_addons

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.changes.outputs.addons }}
      matrix: ${{ steps.changes.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed addons
        id: changes
        run: |
          # Get list of changed files
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual dispatch, build all addons
            ADDONS=$(find . -maxdepth 2 -name "config.yaml" -exec dirname {} \; | sed 's|^\./||' | grep -v '^\.' | tr '\n' ' ')
          else
            # For push/PR, build addon based on branch name
            BRANCH_NAME="${{ github.ref_name }}"
            echo "🔍 Branch name: $BRANCH_NAME"
            
            # Extract addon name from branch name (handles both addon-dev and dev-addon patterns)
            if [[ "$BRANCH_NAME" =~ ^(.+)-dev$ ]]; then
              ADDON_NAME="${BASH_REMATCH[1]}"
            elif [[ "$BRANCH_NAME" =~ ^dev-(.+)$ ]]; then
              ADDON_NAME="${BASH_REMATCH[1]}"
            elif [ "$BRANCH_NAME" == "main" ]; then
              # For main branch, build ALL addons (version check will filter what needs building)
              ADDONS=$(find . -maxdepth 2 -name "config.yaml" -exec dirname {} \; | sed 's|^\./||' | grep -v '^\.' | tr '\n' ' ')
              echo "🏠 Main branch: checking all addons: $ADDONS"
            else
              # For other branches, use git diff to detect changes
              ALL_ADDONS=$(find . -maxdepth 2 -name "config.yaml" -exec dirname {} \; | sed 's|^\./||' | grep -v '^\.' | tr '\n' '|' | sed 's/|$//')
              
              # Handle different contexts for git diff
              if [ "${{ github.event_name }}" == "pull_request" ]; then
                # For PRs, compare against the base branch
                BASE_SHA="${{ github.event.pull_request.base.sha }}"
              elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
                # For pushes with valid before SHA
                BASE_SHA="${{ github.event.before }}"
              else
                # Fallback: compare against previous commit
                BASE_SHA=$(git rev-parse HEAD~1)
              fi
              
              ADDONS=$(git diff --name-only $BASE_SHA ${{ github.sha }} | \
                grep -E "^($ALL_ADDONS)/" | \
                cut -d'/' -f1 | sort -u | tr '\n' ' ')
              echo "📋 Detected changed addons: $ADDONS"
            fi
            
            # If we extracted addon name from branch, validate it exists
            if [ -n "$ADDON_NAME" ] && [ -d "$ADDON_NAME" ] && [ -f "$ADDON_NAME/config.yaml" ]; then
              ADDONS="$ADDON_NAME"
              echo "🎯 Building addon from branch name: $ADDONS"
            elif [ -n "$ADDON_NAME" ]; then
              echo "❌ Addon '$ADDON_NAME' not found, checking for changes..."
              # Fallback to git diff if addon not found
              ALL_ADDONS=$(find . -maxdepth 2 -name "config.yaml" -exec dirname {} \; | sed 's|^\./||' | grep -v '^\.' | tr '\n' '|' | sed 's/|$//')
              
              if [ "${{ github.event_name }}" == "pull_request" ]; then
                BASE_SHA="${{ github.event.pull_request.base.sha }}"
              elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
                BASE_SHA="${{ github.event.before }}"
              else
                BASE_SHA=$(git rev-parse HEAD~1)
              fi
              
              ADDONS=$(git diff --name-only $BASE_SHA ${{ github.sha }} | \
                grep -E "^($ALL_ADDONS)/" | \
                cut -d'/' -f1 | sort -u | tr '\n' ' ')
              echo "📋 Detected changed addons: $ADDONS"
            fi
          fi
          
          if [ -z "$ADDONS" ]; then
            echo "addons=[]"
            echo "matrix=[]"
            exit 0
          fi
          
          # Create JSON matrix
          ADDON_ARRAY="["
          for addon in $ADDONS; do
            if [ -f "$addon/config.yaml" ]; then
              if [ "$ADDON_ARRAY" != "[" ]; then
                ADDON_ARRAY="$ADDON_ARRAY,"
              fi
              ADDON_ARRAY="$ADDON_ARRAY\"$addon\""
            fi
          done
          ADDON_ARRAY="$ADDON_ARRAY]"
          
          echo "addons=$ADDONS"
          echo "matrix=$ADDON_ARRAY"
          echo "::set-output name=addons::$ADDONS"
          echo "::set-output name=matrix::$ADDON_ARRAY"

  check-versions:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    outputs:
      build-matrix: ${{ steps.version-check.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Check versions against GHCR
        id: version-check
        run: |
          MATRIX='${{ needs.detect-changes.outputs.matrix }}'
          BUILD_ARRAY="["
          
          echo "🔍 Étape 1: Addons avec changements de fichiers détectés"
          echo "Addons avec changements: $MATRIX"
          echo ""
          echo "🔍 Étape 2: Vérification des versions pour ces addons"
          echo ""
          
          for addon in $(echo "$MATRIX" | jq -r '.[]'); do
            echo "📦 Traitement de l'addon: $addon"
            
            # Get version from config.yaml
            VERSION=$(yq eval '.version' "$addon/config.yaml" | tr -d '"')
            SLUG=$(yq eval '.slug' "$addon/config.yaml" | tr -d '"')
            echo "  📋 Version locale: $VERSION"
            echo "  🏷️  Slug: $SLUG"
            
            # Get architectures from config.yaml
            ARCHS=$(yq eval '.arch[]' "$addon/config.yaml" | tr '\n' ' ')
            echo "  🏗️  Architectures: $ARCHS"
            
            # Vérifier si les images existent déjà sur GHCR
            echo "  🔍 Vérification des images sur GitHub Container Registry..."
            SKIP_BUILD=true
            
            # Determine image prefix based on branch
            if [ "${{ github.ref_name }}" == "main" ]; then
              IMAGE_PREFIX="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG"
            else
              IMAGE_PREFIX="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/dev-$SLUG"
            fi
            
            for arch in $ARCHS; do
              IMAGE_TAG="$IMAGE_PREFIX-$arch:$VERSION"
              
              # Check if image exists (will fail if not found)
              if ! docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
                echo "    ❌ Image manquante: $IMAGE_TAG"
                SKIP_BUILD=false
                break
              else
                echo "    ✅ Image existante: $IMAGE_TAG"
              fi
            done
            
            # Décision finale: build ou skip basé sur les changements ET la version
            if [ "$SKIP_BUILD" = false ]; then
              echo "  🔨 BUILD NÉCESSAIRE - Changements détectés + images manquantes"
              if [ "$BUILD_ARRAY" != "[" ]; then
                BUILD_ARRAY="$BUILD_ARRAY,"
              fi
              BUILD_ARRAY="$BUILD_ARRAY{\"addon\":\"$addon\",\"version\":\"$VERSION\",\"slug\":\"$SLUG\",\"archs\":\"$ARCHS\"}"
            else
              echo "  ⏭️  SKIP - Changements détectés mais images déjà existent pour la version $VERSION"
            fi
            echo ""
          done
          
          BUILD_ARRAY="$BUILD_ARRAY]"
          echo "build-matrix=$BUILD_ARRAY"
          echo "::set-output name=build-matrix::$BUILD_ARRAY"

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [detect-changes, check-versions]
    if: needs.check-versions.outputs.build-matrix != '[]'
    strategy:
      matrix:
        build: ${{ fromJson(needs.check-versions.outputs.build-matrix) }}
      fail-fast: false
    outputs:
      build-status: ${{ steps.status.outputs.build-status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.build.addon }}-${{ matrix.build.version }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.build.addon }}-
            ${{ runner.os }}-buildx-

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Install build tools
        run: |
          # Install Home Assistant CLI tools (optional, for validation)
          pip install homeassistant-cli
          
          # Note: bashio is typically included in Home Assistant base images
          # and is not needed during the build process itself

      - name: Build and push images for each architecture
        run: |
          ADDON="${{ matrix.build.addon }}"
          VERSION="${{ matrix.build.version }}"
          SLUG="${{ matrix.build.slug }}"
          ARCHS="${{ matrix.build.archs }}"
          
          echo "Building $ADDON version $VERSION"
          echo "Architectures: $ARCHS"
          
          # Parse build.yaml for base images
          BUILD_CONFIG="$ADDON/build.yaml"
          
          # Check if build.yaml has architecture-specific or single base image
          if yq eval '.build_from | type' "$BUILD_CONFIG" | grep -q "!!map"; then
            # Architecture-specific base images (like other addons)
            BASE_IMAGE_TYPE="arch_specific"
          else
            # Single base image (like FossFLOW)
            BASE_IMAGE_TYPE="single"
            SINGLE_BASE_IMAGE=$(yq eval '.build_from' "$BUILD_CONFIG" | tr -d '"')
          fi
          
          for arch in $ARCHS; do
            echo "Building for architecture: $arch"
            
            # Get base image for this architecture
            if [ "$BASE_IMAGE_TYPE" = "arch_specific" ]; then
              BASE_IMAGE=$(yq eval ".build_from.$arch" "$BUILD_CONFIG")
              if [ "$BASE_IMAGE" = "null" ]; then
                echo "No base image found for $arch, skipping"
                continue
              fi
            else
              BASE_IMAGE="$SINGLE_BASE_IMAGE"
            fi
            
            echo "Base image: $BASE_IMAGE"
            
            # Map Home Assistant architecture names to Docker platform names
            case "$arch" in
              "armv7") PLATFORM="linux/arm/v7" ;;
              "armhf") PLATFORM="linux/arm/v6" ;;
              "aarch64") PLATFORM="linux/arm64" ;;
              "amd64") PLATFORM="linux/amd64" ;;
              "i386") PLATFORM="linux/386" ;;
              *) PLATFORM="linux/$arch" ;;
            esac
            
            # Set build arguments
            BUILD_ARGS="--build-arg BUILD_FROM=$BASE_IMAGE"
            BUILD_ARGS="$BUILD_ARGS --build-arg BUILD_VERSION=$VERSION"
            BUILD_ARGS="$BUILD_ARGS --build-arg BUILD_ARCH=$arch"
            
            # Image tag with dev prefix for non-main branches
            if [ "${{ github.ref_name }}" == "main" ]; then
              IMAGE_TAG="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG-$arch:$VERSION"
              IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG-$arch:latest"
            else
              IMAGE_TAG="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/dev-$SLUG-$arch:$VERSION"
              IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/dev-$SLUG-$arch:latest"
            fi
            
            echo "Building image: $IMAGE_TAG"
            
            # Build and push
            docker buildx build \
              $BUILD_ARGS \
              --platform "$PLATFORM" \
              --tag "$IMAGE_TAG" \
              --tag "$IMAGE_TAG_LATEST" \
              --cache-from type=local,src=/tmp/.buildx-cache \
              --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
              --push \
              "$ADDON/"
            
            echo "Successfully built and pushed $IMAGE_TAG"
          done

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create and push multi-arch manifest
        run: |
          ADDON="${{ matrix.build.addon }}"
          VERSION="${{ matrix.build.version }}"
          SLUG="${{ matrix.build.slug }}"
          ARCHS="${{ matrix.build.archs }}"
          
          # Create manifest for all architectures
          MANIFEST_TAG="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG:$VERSION"
          MANIFEST_LATEST="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG:latest"
          
          echo "Creating multi-arch manifest: $MANIFEST_TAG"
          
          # Remove existing manifest if it exists
          docker manifest rm "$MANIFEST_TAG" 2>/dev/null || true
          docker manifest rm "$MANIFEST_LATEST" 2>/dev/null || true
          
          # Create new manifest
          MANIFEST_CMD="docker manifest create $MANIFEST_TAG"
          MANIFEST_LATEST_CMD="docker manifest create $MANIFEST_LATEST"
          
          for arch in $ARCHS; do
            ARCH_IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_PREFIX }}/$SLUG-$arch:$VERSION"
            MANIFEST_CMD="$MANIFEST_CMD $ARCH_IMAGE"
            MANIFEST_LATEST_CMD="$MANIFEST_LATEST_CMD $ARCH_IMAGE"
          done
          
          eval $MANIFEST_CMD
          eval $MANIFEST_LATEST_CMD
          
          # Push manifests
          docker manifest push "$MANIFEST_TAG"
          docker manifest push "$MANIFEST_LATEST"
          
          echo "Successfully pushed multi-arch manifests"

      - name: Update repository metadata
        run: |
          # This step could be extended to update a repository.json file
          # with the new image information for Home Assistant to use
          echo "Repository metadata update completed"

      - name: Record build status
        id: status
        if: always()
        run: |
          ADDON="${{ matrix.build.addon }}"
          VERSION="${{ matrix.build.version }}"
          
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="success"
          elif [ "${{ job.status }}" == "failure" ]; then
            STATUS="error"
          else
            STATUS="skipped"
          fi
          
          echo "build-status={\"addon\":\"$ADDON\",\"version\":\"$VERSION\",\"status\":\"$STATUS\"}" >> $GITHUB_OUTPUT

  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, check-versions, build-and-publish]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Build Summary
        run: |
          echo "## Docker Build and Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detect-changes.outputs.matrix }}" = "[]" ]; then
            echo "✅ No addon changes detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "📋 Detected changes in: ${{ needs.detect-changes.outputs.addons }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Get all changed addons
            ALL_ADDONS='${{ needs.detect-changes.outputs.matrix }}'
            
            # Get addons that were built
            BUILT_ADDONS='${{ needs.check-versions.outputs.build-matrix }}'
            
            echo "### 📊 Build Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Process each addon and determine its status
            for addon in $(echo "$ALL_ADDONS" | jq -r '.[]'); do
              # Get version from config.yaml (we need to checkout for this)
              if [ -f "$addon/config.yaml" ]; then
                VERSION=$(yq eval '.version' "$addon/config.yaml" 2>/dev/null | tr -d '"')
                
                # Check if this addon was in the build matrix
                if echo "$BUILT_ADDONS" | jq -e '.[] | select(.addon == "'$addon'")' > /dev/null 2>&1; then
                  # This addon was built - check build job status
                  if [ "${{ needs.build-and-publish.result }}" == "success" ]; then
                    echo "🔨 **$addon** v$VERSION - ✅ Built successfully" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "🔨 **$addon** v$VERSION - ❌ Build failed" >> $GITHUB_STEP_SUMMARY
                  fi
                else
                  # This addon was skipped (version already exists)
                  echo "⏭️ **$addon** v$VERSION - ⏸️ Skipped (version already exists)" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done
          fi
