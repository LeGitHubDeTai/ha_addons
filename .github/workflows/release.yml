name: Release Addons

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ghcr.io/legithubdetai/

jobs:
  extract-addons:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.addons.outputs.addons }}
      matrix: ${{ steps.addons.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract addons list
        id: addons
        run: |
          addons=()
          for dir in */; do
            if [ -f "$dir/config.yaml" ] && [ -f "$dir/Dockerfile" ]; then
              addon_name=$(basename "$dir")
              addons+=("$addon_name")
            fi
          done
          
          echo "addons=${addons[*]}" >> $GITHUB_OUTPUT
          
          # Create matrix JSON
          matrix_json="["
          for i in "${!addons[@]}"; do
            if [ $i -gt 0 ]; then
              matrix_json+=","
            fi
            matrix_json+="{\"addon\":\"${addons[$i]}\"}"
          done
          matrix_json+="]"
          
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
          echo "Found addons: ${addons[*]}"

  build-and-release:
    needs: [extract-addons, create-release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.extract-addons.outputs.matrix) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get addon version
        id: version
        run: |
          if [ -f "${{ matrix.addon }}/config.yaml" ]; then
            VERSION=$(grep '^version:' "${{ matrix.addon }}/config.yaml" | sed 's/version: "//' | sed 's/"//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Addon version: $VERSION"
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "No config.yaml found, using latest"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_PREFIX }}${{ matrix.addon }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.18
            BUILD_VERSION=${{ steps.version.outputs.version }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME_PREFIX }}${{ matrix.addon }}:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: "${{ matrix.addon }}-sbom.spdx.json"

      - name: Upload SBOM as release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: "${{ matrix.addon }}-sbom.spdx.json"
          asset_name: "${{ matrix.addon }}-sbom.spdx.json"
          asset_content_type: application/json

  create-release:
    needs: extract-addons
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Home Assistant Addons Release ${{ github.ref }}
            
            ## Addons included:
            ${{ needs.extract-addons.outputs.addons }}
            
            ## Docker Images:
            All addons are available at `ghcr.io/${{ github.repository }}/addon-name`
            
            ## Installation:
            Add this repository to your Home Assistant Supervisor:
            ```
            https://github.com/${{ github.repository }}
            ```
          draft: false
          prerelease: false
