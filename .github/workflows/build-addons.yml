name: Build Home Assistant Addons Docker Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_addon:
        description: 'Addon spécifique à builder (laisser vide pour tous)'
        required: false
        default: ''
      force_rebuild:
        description: 'Forcer le rebuild meme si l image existe'
        required: false
        default: false
        type: boolean
      update_existing:
        description: 'Mettre a jour les images existantes si version plus recente'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ghcr.io/legithubdetai/ha_addons/
  BUILD_ARGS: ''

jobs:
  discover-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover and build addons
        if: env.BUILD_ARGS != '--test'
        run: |
          # Créer un fichier pour suivre les builds
          echo "# Build Report - $(date)" > build_report.md
          echo "" >> build_report.md
          
          # Découvrir tous les addons disponibles
          ADDONS_LIST=""
          for dir in */; do
            addon_name=$(basename "$dir")
            if [ -f "$dir/config.yaml" ] && [ -f "$dir/Dockerfile" ]; then
              ADDONS_LIST="$ADDONS_LIST,$addon_name"
            fi
          done
          ADDONS_LIST=$(echo "$ADDONS_LIST" | sed 's/^,//')
          echo "Addons disponibles: $ADDONS_LIST"
          
          # Vérifier si un addon spécifique est demandé
          TARGET_ADDON="${{ github.event.inputs.target_addon }}"
          echo "Addon cible: $TARGET_ADDON"
          
          for dir in */; do
            addon_name=$(basename "$dir")
            
            # Si un addon spécifique est demandé, skip les autres
            if [ -n "$TARGET_ADDON" ] && [ "$TARGET_ADDON" != "$addon_name" ]; then
              echo "Skip $addon_name (addon cible: $TARGET_ADDON)"
              continue
            fi
            
            # Vérifier si c'est un addon valide
            if [ -f "$dir/config.yaml" ] && [ -f "$dir/Dockerfile" ]; then
              echo "=== Traitement de l'addon: $addon_name ==="
              
              # Récupérer la version
              if [ -f "$dir/config.yaml" ]; then
                version=$(grep '^version:' "$dir/config.yaml" | sed 's/version: "//' | sed 's/"//' || echo "latest")
              else
                version="latest"
              fi
              
              echo "Version: $version"
              
              # Déterminer l'image de base
              if grep -q "apt-get" "$dir/Dockerfile"; then
                base_image="ubuntu:22.04"
                platforms="linux/amd64,linux/arm64"
              else
                base_image="ghcr.io/home-assistant/amd64-base:3.18"
                platforms="linux/amd64,linux/arm64,linux/arm/v7"
              fi
              
              echo "Base image: $base_image"
              echo "Platforms: $platforms"
              
              # Vérifier si l'image existe déjà
              addon_name_lower=$(echo "$addon_name" | tr '[:upper:]' '[:lower:]')
              image_name="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}:${version}"
              echo "Image cible: $image_name"
              
              # Vérifier si la version existe déjà dans le registry
              if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
                echo "Force rebuild activé"
                should_build=true
              elif docker manifest inspect "$image_name" >/dev/null 2>&1; then
                if [ "${{ github.event.inputs.update_existing }}" = "true" ]; then
                  echo "Image $image_name existe déjà, vérification de la version..."
                  # Récupérer la date de création de l'image existante
                  created_date=$(docker manifest inspect "$image_name" 2>/dev/null | jq -r '.manifests[0].annotations."org.opencontainers.image.created"' 2>/dev/null || echo "")
                  
                  if [ -n "$created_date" ]; then
                    echo "Image existante créée le: $created_date"
                    echo "Nouvelle version: $version"
                    echo "Mise à jour automatique activée"
                    should_build=true
                  else
                    echo "Impossible de vérifier la date de création, mise à jour automatique"
                    should_build=true
                  fi
                else
                  echo "Image $image_name existe déjà, skip (mise à jour désactivée)"
                  should_build=false
                fi
              else
                echo "Image $image_name n'existe pas, build requis"
                should_build=true
              fi
              
              # Builder l'image si nécessaire
              if [ "$should_build" = "true" ]; then
                echo "Build de $addon_name..."
                
                # Tenter le build avec gestion d'erreur
                if docker buildx build \
                  --platform "$platforms" \
                  --push \
                  --tag "$image_name" \
                  --tag "${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}:latest" \
                  --build-arg "BUILD_FROM=$base_image" \
                  --build-arg "BUILD_VERSION=$version" \
                  --build-arg "BUILD_ARCH=amd64" \
                  --cache-from "type=gha" \
                  --cache-to "type=gha,mode=max" \
                  "./$addon_name"; then
                  
                  echo "✅ Build terminé pour $addon_name"
                  echo "- ✅ **$addon_name** ($version) : Build réussi" >> build_report.md
                  
                  # Créer les tags spécifiques par architecture pour Home Assistant
                  echo "Création des tags spécifiques par architecture..."
                  for arch in amd64 arm64 armv7; do
                    if echo "$platforms" | grep -q "$arch"; then
                      arch_image="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}-${arch}:${version}"
                      latest_arch="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}-${arch}:latest"
                      
                      echo "Création du tag $arch_image"
                      docker buildx imagetools create \
                        --tag "$arch_image" \
                        --tag "$latest_arch" \
                        "$image_name" || echo "Impossible de créer le tag pour $arch"
                    fi
                  done
                else
                  echo "❌ Build échoué pour $addon_name"
                  echo "- ❌ **$addon_name** ($version) : Build échoué" >> build_report.md
                  # Continuer avec le prochain addon
                fi
              else
                echo "⏭️  Skip $addon_name (image existe)"
                echo "- ⏭️ **$addon_name** ($version) : Image existante, skip" >> build_report.md
              fi
              
              echo ""
            fi
          done
          
          echo "## Rapport de build" >> $GITHUB_STEP_SUMMARY
          cat build_report.md >> $GITHUB_STEP_SUMMARY
