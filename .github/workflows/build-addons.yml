name: Build Home Assistant Addons Docker Images

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'TROUBLESHOOTING.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_addon:
        description: 'Addon spûˋcifique û  builder (laisser vide pour tous)'
        required: false
        default: ''
      force_rebuild:
        description: 'Forcer le rebuild meme si l image existe'
        required: false
        default: false
        type: boolean
      update_existing:
        description: 'Mettre a jour les images existantes si version plus recente'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ghcr.io/legithubdetai/ha_addons/
  BUILD_ARGS: ''

jobs:
  discover-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover and build addons
        if: env.BUILD_ARGS != '--test'
        run: |
          # Crûˋer un fichier pour suivre les builds
          echo "# Build Report - $(date)" > build_report.md
          echo "" >> build_report.md
          
          # Dûˋcouvrir tous les addons disponibles
          ADDONS_LIST=""
          for dir in */; do
            addon_name=$(basename "$dir")
            if [ -f "$dir/config.yaml" ] && [ -f "$dir/Dockerfile" ]; then
              ADDONS_LIST="$ADDONS_LIST,$addon_name"
            fi
          done
          ADDONS_LIST=$(echo "$ADDONS_LIST" | sed 's/^,//')
          echo "Addons disponibles: $ADDONS_LIST"
          
          # Dûˋtecter les addons modifiûˋs
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Dûˋtection des addons modifiûˋs..."
            
            # Vûˋrifier si HEAD~1 existe (premier commit)
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              MODIFIED_ADDONS=$(git diff --name-only HEAD~1 HEAD | grep -E '^[^/]+/$' | sed 's|/$||' | tr '\n' ',' | sed 's/,$//')
              echo "Addons modifiûˋs: $MODIFIED_ADDONS"
              
              # Si aucun addon modifiûˋ, ne rien builder
              if [ -z "$MODIFIED_ADDONS" ]; then
                echo "Aucun addon modifiûˋ, build terminûˋ"
                echo "## Rapport de build" >> $GITHUB_STEP_SUMMARY
                echo "Aucun addon modifiûˋ dans ce push" >> $GITHUB_STEP_SUMMARY
                exit 0
              fi
              
              # Convertir en tableau pour itûˋration
              IFS=',' read -ra MODIFIED_ARRAY <<< "$MODIFIED_ADDONS"
            else
              echo "Premier commit dûˋtectûˋ, build de tous les addons"
              MODIFIED_ADDONS=""
            fi
          fi
          
          # Vûˋrifier si un addon spûˋcifique est demandûˋ
          TARGET_ADDON="${{ github.event.inputs.target_addon }}"
          echo "Addon cible: $TARGET_ADDON"
          
          for dir in */; do
            addon_name=$(basename "$dir")
            
            # Si un addon spûˋcifique est demandûˋ, skip les autres
            if [ -n "$TARGET_ADDON" ] && [ "$TARGET_ADDON" != "$addon_name" ]; then
              echo "Skip $addon_name (addon cible: $TARGET_ADDON)"
              continue
            fi
            
            # Si c'est un push et l'addon n'a pas ûˋtûˋ modifiûˋ, le skipper
            if [ "${{ github.event_name }}" = "push" ] && [ -n "$MODIFIED_ADDONS" ]; then
              ADDON_MODIFIED=false
              for modified in "${MODIFIED_ARRAY[@]}"; do
                if [ "$modified" = "$addon_name" ]; then
                  ADDON_MODIFIED=true
                  break
                fi
              done
              
              if [ "$ADDON_MODIFIED" = "false" ]; then
                echo "Skip $addon_name (non modifiûˋ dans ce push)"
                continue
              fi
            fi
            
            # Vûˋrifier si c'est un addon valide
            if [ -f "$dir/config.yaml" ] && [ -f "$dir/Dockerfile" ]; then
              echo "=== Traitement de l'addon: $addon_name ==="
              
              # Rûˋcupûˋrer la version
              if [ -f "$dir/config.yaml" ]; then
                version=$(grep '^version:' "$dir/config.yaml" | sed 's/version: "//' | sed 's/"//' || echo "latest")
              else
                version="latest"
              fi
              
              echo "Version: $version"
              
              # Dûˋterminer l'image de base et les plateformes
              if [ -f "$dir/build.yaml" ]; then
                echo "Utilisation du build.yaml personnalisûˋ"
                
                # Lire le build.yaml pour dûˋterminer les images de base
                if grep -q "build_from:" "$dir/build.yaml"; then
                  # Cas avec une seule image (FossFLOW)
                  if grep -A1 "^build_from:" "$dir/build.yaml" | grep -q "^[[:space:]]*\""; then
                    base_image=$(grep "^build_from:" "$dir/build.yaml" | sed 's/build_from: "//' | sed 's/"//')
                    platforms="linux/amd64,linux/arm64,linux/arm/v7"
                    echo "Image de base unique: $base_image"
                    build_type="single"
                  else
                    # Cas avec plusieurs images par architecture (n8n, planka)
                    base_image="ubuntu:22.04"  # Image par dûˋfaut pour multi-arch
                    platforms="linux/amd64,linux/arm64,linux/arm/v7,linux/armhf"
                    echo "Images multi-architecture dûˋtectûˋes, utilisation de l'image par dûˋfaut: $base_image"
                    build_type="multi-arch"
                  fi
                else
                  # Fallback si pas de build_from dans build.yaml
                  base_image="ghcr.io/home-assistant/amd64-base:3.18"
                  platforms="linux/amd64,linux/arm64,linux/arm/v7"
                  build_type="single"
                fi
              else
                # Dûˋtection automatique si pas de build.yaml
                if grep -q "apt-get" "$dir/Dockerfile"; then
                  base_image="ubuntu:22.04"
                  platforms="linux/amd64,linux/arm64"
                  build_type="single"
                else
                  base_image="ghcr.io/home-assistant/amd64-base:3.18"
                  platforms="linux/amd64,linux/arm64,linux/arm/v7"
                  build_type="single"
                fi
              fi
              
              echo "Base image: $base_image"
              echo "Platforms: $platforms"
              
              # Vûˋrifier si l'image existe dûˋjû 
              addon_name_lower=$(echo "$addon_name" | tr '[:upper:]' '[:lower:]')
              image_name="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}:${version}"
              echo "Image cible: $image_name"
              
              # Vûˋrifier si la version existe dûˋjû  dans le registry
              if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
                echo "Force rebuild activûˋ"
                should_build=true
              elif docker manifest inspect "$image_name" >/dev/null 2>&1; then
                if [ "${{ github.event.inputs.update_existing }}" = "true" ]; then
                  echo "Image $image_name existe dûˋjû , vûˋrification de la version..."
                  # Rûˋcupûˋrer la date de crûˋation de l'image existante
                  created_date=$(docker manifest inspect "$image_name" 2>/dev/null | jq -r '.manifests[0].annotations."org.opencontainers.image.created"' 2>/dev/null || echo "")
                  
                  if [ -n "$created_date" ]; then
                    echo "Image existante crûˋûˋe le: $created_date"
                    echo "Nouvelle version: $version"
                    echo "Mise û  jour automatique activûˋe"
                    should_build=true
                  else
                    echo "Impossible de vûˋrifier la date de crûˋation, mise û  jour automatique"
                    should_build=true
                  fi
                else
                  echo "Image $image_name existe dûˋjû , skip (mise û  jour dûˋsactivûˋe)"
                  should_build=false
                fi
              else
                echo "Image $image_name n'existe pas, build requis"
                should_build=true
              fi
              
              # Builder l'image si nûˋcessaire
              if [ "$should_build" = "true" ]; then
                echo "Build de $addon_name..."
                
                # Copier le script bashio dans le dossier de l'addon
                cp scripts/install-bashio.sh "$addon_name/"
                
                # Prûˋparer les arguments de build selon le build.yaml
                BUILD_ARGS=""
                if [ "$build_type" = "multi-arch" ]; then
                  echo "Utilisation des images multi-architecture depuis build.yaml"
                  # Pour le multi-arch, on passe le build.yaml comme contexte
                  BUILD_ARGS="--build-arg BUILD_CONFIG_FILE=build.yaml"
                else
                  echo "Utilisation de l'image de base: $base_image"
                  BUILD_ARGS="--build-arg BUILD_FROM=$base_image"
                fi
                
                BUILD_ARGS="$BUILD_ARGS --build-arg BUILD_VERSION=$version --build-arg BUILD_ARCH=amd64"
                
                # Tenter le build avec gestion d'erreur
                if docker buildx build \
                  --platform "$platforms" \
                  --push \
                  --tag "$image_name" \
                  --tag "${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}:latest" \
                  $BUILD_ARGS \
                  --cache-from "type=gha" \
                  --cache-to "type=gha,mode=max" \
                  "./$addon_name"; then
                  
                  echo "ã Build terminûˋ pour $addon_name"
                  echo "- ã **$addon_name** ($version) : Build rûˋussi" >> build_report.md
                  
                  # Crûˋer les tags spûˋcifiques par architecture pour Home Assistant
                  echo "Crûˋation des tags spûˋcifiques par architecture..."
                  for arch in amd64 arm64 armv7; do
                    if echo "$platforms" | grep -q "$arch"; then
                      arch_image="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}-${arch}:${version}"
                      latest_arch="${{ env.IMAGE_NAME_PREFIX }}${addon_name_lower}-${arch}:latest"
                      
                      echo "Crûˋation du tag $arch_image"
                      docker buildx imagetools create \
                        --tag "$arch_image" \
                        --tag "$latest_arch" \
                        "$image_name" || echo "Impossible de crûˋer le tag pour $arch"
                    fi
                  done
                else
                  echo "ã Build ûˋchouûˋ pour $addon_name"
                  echo "- ã **$addon_name** ($version) : Build ûˋchouûˋ" >> build_report.md
                  # Continuer avec le prochain addon
                fi
                
                # Nettoyer le script temporaire
                rm -f "$addon_name/install-bashio.sh"
              else
                echo "ãÙÿ¡  Skip $addon_name (image existe)"
                echo "- ãÙÿ¡ **$addon_name** ($version) : Image existante, skip" >> build_report.md
              fi
              
              echo ""
            fi
          done
          
          echo "## Rapport de build" >> $GITHUB_STEP_SUMMARY
          cat build_report.md >> $GITHUB_STEP_SUMMARY
