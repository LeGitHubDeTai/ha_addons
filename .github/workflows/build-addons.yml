name: Build Home Assistant Addons Docker Images

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'TROUBLESHOOTING.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_addon:
        description: 'Addon spécifique à builder (laisser vide pour tous)'
        required: false
        default: ''
      force_rebuild:
        description: 'Forcer le rebuild même si l image existe'
        required: false
        default: false
        type: boolean
      update_existing:
        description: 'Mettre à jour les images existantes si version plus récente'
        required: false
        default: true
        type: boolean

env:
  BUILD_ARGS: ''

jobs:
  # 1. Detect which add-on folders changed
  detect-changed-addons:
    runs-on: ubuntu-latest
    outputs:
      changedAddons: ${{ steps.find_addons.outputs.changed_addons }}
      allAddons: ${{ steps.find_addons.outputs.all_addons }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Find addon directories
        id: find_addons
        run: |
          # Pour les pushes, trouver les addons modifiés
          if [ "${{ github.event_name }}" = "push" ]; then
            git fetch origin "${{ github.event.before }}" || true
            changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
            echo "Changed files: $changed_files"
            
            changed_addons=""
            for file in $changed_files; do
              if [[ "$file" =~ ^[^/]+/ ]] && [ -d "$(dirname "$file")" ]; then
                addon=$(dirname "$file")
                if [ -f "$addon/config.yaml" ] || [ -f "$addon/config.json" ]; then
                  changed_addons="$changed_addons $addon"
                fi
              fi
            done
            
            changed_addons=$(echo "$changed_addons" | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/ *$//')
            echo "Changed addons: $changed_addons"
            echo "changed_addons=$changed_addons" >> "$GITHUB_OUTPUT"
          else
            # Pour workflow_dispatch ou PR, prendre tous les addons
            all_addons=""
            for dir in */; do
              addon_name=$(basename "$dir")
              if [ -f "$dir/config.yaml" ] || [ -f "$dir/config.json" ]; then
                all_addons="$all_addons $addon_name"
              fi
            done
            all_addons=$(echo "$all_addons" | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/ *$//')
            echo "All addons: $all_addons"
            echo "all_addons=$all_addons" >> "$GITHUB_OUTPUT"
            echo "changed_addons=$all_addons" >> "$GITHUB_OUTPUT"
          fi

  # 2. Pre-build sanitize
  prebuild-sanitize:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: detect-changed-addons
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Sanitize text files (Unicode spaces + CRLF → LF)
        run: |
          cd "${{ matrix.addon }}"
          UNICODE_SPACES_REGEX=$'[\\u00A0\\u2002\\u2003\\u2007\\u2008\\u2009\\u202F\\u205F\\u3000\\u200B]'

          find . -type f | while read -r file; do
            MIME_TYPE=$(file --mime-type -b "$file" 2>/dev/null || echo "")
            [[ "$MIME_TYPE" != text/* ]] && continue

            echo "Sanitizing $file"
            perl -i -CSD -pe "
              s/${UNICODE_SPACES_REGEX}/ /g;
              s/\\r$//;
            " "$file" 2>/dev/null || true
          done
      
      - name: Make all .sh scripts executable
        run: |
          cd "${{ matrix.addon }}"
          find . -type f -iname "*.sh" -exec chmod u+x {} \;

  # 3. Lint add-on configs
  lint_config:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: [detect-changed-addons, prebuild-sanitize]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ matrix.addon }}"

  # 4. Build images for changed addons/arches
  build:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: [detect-changed-addons, lint_config]
    runs-on: ubuntu-latest
    environment: production
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
        arch: ["aarch64", "amd64", "armv7", "armhf", "i386"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Filter target addon
        if: ${{ github.event.inputs.target_addon != '' }}
        run: |
          if [ "${{ matrix.addon }}" != "${{ github.event.inputs.target_addon }}" ]; then
            echo "Skipping ${{ matrix.addon }} (target: ${{ github.event.inputs.target_addon }})"
            exit 1
          fi
      
      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"
      
      - name: Check if Dockerfile exists
        id: dockerfile_check
        run: |
          if [ -f "./${{ matrix.addon }}/Dockerfile" ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Dockerfile found in ${{ matrix.addon }}, skipping build."
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Check if add-on should be built for arch
        id: check
        env:
          HEAD: "${{ github.head_ref }}"
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
             echo "build_arch=true" >> "$GITHUB_OUTPUT";
             echo "image=$(echo "${{ steps.info.outputs.image }}" | cut -d'/' -f3)" >> "$GITHUB_OUTPUT";
             if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                 echo "BUILD_ARGS=--test" >> "$GITHUB_ENV";
             fi
          else
             echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
             echo "build_arch=false" >> "$GITHUB_OUTPUT";
          fi
      
      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build ${{ matrix.addon }} add-on
        id: builderstep
        if: steps.check.outputs.build_arch == 'true' && steps.dockerfile_check.outputs.has_dockerfile == 'true'
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target "/data/${{ matrix.addon }}" \
            --image "${{ steps.check.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon

  # 5. Build Summary
  build-summary:
    if: always()
    needs: [detect-changed-addons, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate build summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Addons processed:" >> $GITHUB_STEP_SUMMARY
          
          addons="${{ needs.detect-changed-addons.outputs.changedAddons }}"
          if [ -n "$addons" ] && [ "$addons" != "[]" ]; then
            echo "$addons" | tr ',' '\n' | while read addon; do
              addon=$(echo "$addon" | sed 's/^ *//' | sed 's/ *$//')
              if [ -n "$addon" ]; then
                echo "- **$addon**" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No addons to process" >> $GITHUB_STEP_SUMMARY
          fi
