name: Auto-upgrade n8n

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  auto-upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current versions
        id: current
        run: |
          # Get version from config.yaml
          CONFIG_VERSION=$(grep -E '^version:' n8n/config.yaml | sed 's/version: "//' | sed 's/"//')
          echo "config_version=$CONFIG_VERSION" >> $GITHUB_OUTPUT
          
          # Get version from Dockerfile
          DOCKERFILE_VERSION=$(grep -E 'npm install -g n8n@' n8n/Dockerfile | sed 's/.*n8n@//' | sed 's/[[:space:]].*//')
          echo "dockerfile_version=$DOCKERFILE_VERSION" >> $GITHUB_OUTPUT
          
          echo "Current config version: $CONFIG_VERSION"
          echo "Current Dockerfile version: $DOCKERFILE_VERSION"

      - name: Get latest n8n release
        id: latest
        run: |
          # Fetch latest release from GitHub API
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/n8n-io/n8n/releases/latest | jq -r '.tag_name')
          
          # Extract version number from tag (format: n8n@X.Y.Z)
          LATEST_VERSION=$(echo $LATEST_RELEASE | sed 's/n8n@//')
          
          echo "latest_release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "release_url=$(curl -s https://api.github.com/repos/n8n-io/n8n/releases/latest | jq -r '.html_url')" >> $GITHUB_OUTPUT
          
          echo "Latest release: $LATEST_RELEASE"
          echo "Latest version: $LATEST_VERSION"

      - name: Compare versions
        id: compare
        run: |
          CURRENT_VERSION="${{ steps.current.outputs.config_version }}"
          LATEST_VERSION="${{ steps.latest.outputs.latest_version }}"
          
          # Compare versions using sort -V
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" = "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "needs_upgrade=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST_VERSION (current: $CURRENT_VERSION)"
          else
            echo "needs_upgrade=false" >> $GITHUB_OUTPUT
            echo "Already up-to-date or no new version"
          fi

      - name: Create upgrade branch
        id: branch
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          BRANCH_NAME="upgrade/n8n-v${{ steps.latest.outputs.latest_version }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Update config.yaml
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Update version in config.yaml
          sed -i "s/^version: .*/version: \"${{ steps.latest.outputs.latest_version }}\"/" n8n/config.yaml
          echo "Updated config.yaml version to ${{ steps.latest.outputs.latest_version }}"

      - name: Update Dockerfile
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Update version in Dockerfile
          sed -i "s/npm install -g n8n@.*/npm install -g n8n@${{ steps.latest.outputs.latest_version }}/" n8n/Dockerfile
          echo "Updated Dockerfile version to ${{ steps.latest.outputs.latest_version }}"

      - name: Commit changes
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add n8n/config.yaml n8n/Dockerfile
          git commit -m "⬆️ Upgrade n8n to ${{ steps.latest.outputs.latest_version }}"

      - name: Push branch
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"

      - name: Create Pull Request
        if: steps.compare.outputs.needs_upgrade == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.branch_name }}
          title: "⬆️${{ steps.latest.outputs.latest_version }}"
          body: |
            Auto-upgrade n8n to version ${{ steps.latest.outputs.latest_version }}
            
            **Changes:**
            - Updated config.yaml version to ${{ steps.latest.outputs.latest_version }}
            - Updated Dockerfile to use n8n@${{ steps.latest.outputs.latest_version }}
            
            **Release:** ${{ steps.latest.outputs.release_url }}
            
            This PR was created automatically by the auto-upgrade workflow.
          labels: |
            auto-upgrade
            dependencies
          draft: false
