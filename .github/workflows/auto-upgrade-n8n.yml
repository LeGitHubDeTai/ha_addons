name: Auto-upgrade n8n

# Workflow to automatically upgrade n8n addon when new releases are available
on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  auto-upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current versions
        id: current
        run: |
          # Get n8n version from Dockerfile
          DOCKERFILE_VERSION=$(grep -E 'npm install -g n8n@' n8n/Dockerfile | sed 's/.*n8n@//' | sed 's/[[:space:]].*//')
          echo "dockerfile_version=$DOCKERFILE_VERSION" >> $GITHUB_OUTPUT
          
          # Get addon version from config.yaml
          CONFIG_VERSION=$(grep -E '^version:' n8n/config.yaml | sed 's/version: "//' | sed 's/"//')
          echo "config_version=$CONFIG_VERSION" >> $GITHUB_OUTPUT
          
          echo "Current n8n version: $DOCKERFILE_VERSION"
          echo "Current addon version: $CONFIG_VERSION"

      - name: Get latest n8n release
        id: latest
        run: |
          # Get all releases and find the first valid one (not stable/latest tag)
          RAW_RELEASES=$(curl -s "https://api.github.com/repos/n8n-io/n8n/releases?per_page=20")
          
          # Find the first release that is not "stable" or "latest" tag
          LATEST_RELEASE=""
          IS_PRERELEASE="false"
          
          for row in $(echo "$RAW_RELEASES" | jq -r '.[] | @base64'); do
            _jq() {
              echo "$row" | base64 --decode | jq -r "$1"
            }
            
            tag=$(_jq '.tag_name')
            VERSION=$(echo $tag | sed 's/n8n@//')
            
            if [[ "$VERSION" != "stable" && "$VERSION" != "latest" ]]; then
              LATEST_RELEASE="$tag"
              IS_PRERELEASE=$(_jq '.prerelease')
              break
            fi
          done
          
          # Extract version number from tag (format: n8n@X.Y.Z)
          LATEST_VERSION=$(echo $LATEST_RELEASE | sed 's/n8n@//')
          
          # Determine release type label
          if [ "$IS_PRERELEASE" = "true" ]; then
            RELEASE_TYPE="pre-release"
          else
            RELEASE_TYPE="latest"
          fi
          
          echo "latest_release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "release_url=$(echo "$RAW_RELEASES" | jq -r ".[] | select(.tag_name==\"$LATEST_RELEASE\") | .html_url")" >> $GITHUB_OUTPUT
          
          echo "Latest release: $LATEST_RELEASE"
          echo "Latest version: $LATEST_VERSION"
          echo "Release type: $RELEASE_TYPE"

      - name: Compare versions and check existing PRs
        id: compare
        run: |
          CURRENT_N8N_VERSION="${{ steps.current.outputs.dockerfile_version }}"
          LATEST_VERSION="${{ steps.latest.outputs.latest_version }}"
          RELEASE_TYPE="${{ steps.latest.outputs.release_type }}"
          
          # Check if this is a new version
          IS_NEW_VERSION=false
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$CURRENT_N8N_VERSION" | sort -V | head -n1)" = "$CURRENT_N8N_VERSION" ] && [ "$CURRENT_N8N_VERSION" != "$LATEST_VERSION" ]; then
            IS_NEW_VERSION=true
          fi
          
          # Check if there's an existing PR for this version with different release type
          NEEDS_LABEL_UPDATE=false
          EXISTING_PR=""
          
          if [ "$IS_NEW_VERSION" = "false" ]; then
            # Look for existing PRs for this version
            PR_LIST=$(gh pr list --search "n8n $LATEST_VERSION" --json number,labels,headRefName --jq '.[]')
            
            if [ -n "$PR_LIST" ]; then
              while IFS= read -r pr; do
                PR_NUMBER=$(echo "$pr" | jq -r '.number')
                PR_LABELS=$(echo "$pr" | jq -r '.labels[].name')
                PR_BRANCH=$(echo "$pr" | jq -r '.headRefName')
                
                # Check if PR has different release type label
                if [ "$RELEASE_TYPE" = "latest" ] && echo "$PR_LABELS" | grep -q "pre-release"; then
                  NEEDS_LABEL_UPDATE=true
                  EXISTING_PR="$PR_NUMBER"
                  EXISTING_BRANCH="$PR_BRANCH"
                  echo "Found PR #$PR_NUMBER with pre-release label that needs update to latest"
                  break
                elif [ "$RELEASE_TYPE" = "pre-release" ] && echo "$PR_LABELS" | grep -q "latest"; then
                  NEEDS_LABEL_UPDATE=true
                  EXISTING_PR="$PR_NUMBER"
                  EXISTING_BRANCH="$PR_BRANCH"
                  echo "Found PR #$PR_NUMBER with latest label that needs update to pre-release"
                  break
                fi
              done <<< "$PR_LIST"
            fi
          fi
          
          if [ "$IS_NEW_VERSION" = "true" ] || [ "$NEEDS_LABEL_UPDATE" = "true" ]; then
            echo "needs_upgrade=true" >> $GITHUB_OUTPUT
            echo "needs_label_update=$NEEDS_LABEL_UPDATE" >> $GITHUB_OUTPUT
            echo "existing_pr=$EXISTING_PR" >> $GITHUB_OUTPUT
            echo "existing_branch=$EXISTING_BRANCH" >> $GITHUB_OUTPUT
            echo "is_new_version=$IS_NEW_VERSION" >> $GITHUB_OUTPUT
            if [ "$IS_NEW_VERSION" = "true" ]; then
              echo "New n8n version available: $LATEST_VERSION (current: $CURRENT_N8N_VERSION)"
            else
              echo "Release type changed to $RELEASE_TYPE for version $LATEST_VERSION"
            fi
          else
            echo "needs_upgrade=false" >> $GITHUB_OUTPUT
            echo "Already up-to-date or no new version"
          fi

      - name: Generate new addon version
        id: addon_version
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Get current year and month in correct format
          CURRENT_YEAR=$(date +%y)  # YY format (26 for 2026)
          CURRENT_MONTH=$(date +%m)  # MM format
          CURRENT_MONTH=${CURRENT_MONTH#0}  # Remove leading zero
          
          # Get current addon version and extract the patch number
          CURRENT_ADDON_VERSION="${{ steps.current.outputs.config_version }}"
          CURRENT_PATCH=$(echo $CURRENT_ADDON_VERSION | cut -d. -f3)
          
          # If year.month changed, reset patch to 1, otherwise increment
          CURRENT_YEAR_MONTH=$(echo $CURRENT_ADDON_VERSION | cut -d. -f1,2)
          NEW_YEAR_MONTH="$CURRENT_YEAR.$CURRENT_MONTH"
          
          if [ "$CURRENT_YEAR_MONTH" = "$NEW_YEAR_MONTH" ]; then
            # Same month, increment patch
            NEW_PATCH=$((CURRENT_PATCH + 1))
          else
            # New month, reset patch to 1
            NEW_PATCH=1
          fi
          
          NEW_ADDON_VERSION="$NEW_YEAR_MONTH.$NEW_PATCH"
          echo "new_addon_version=$NEW_ADDON_VERSION" >> $GITHUB_OUTPUT
          echo "New addon version: $NEW_ADDON_VERSION"

      - name: Create or checkout upgrade branch
        id: branch
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Use existing branch if we're just updating labels
          if [ "${{ steps.compare.outputs.needs_label_update }}" = "true" ] && [ -n "${{ steps.compare.outputs.existing_branch }}" ]; then
            BRANCH_NAME="${{ steps.compare.outputs.existing_branch }}"
            echo "Using existing branch $BRANCH_NAME for label update"
          else
            BRANCH_NAME="upgrade/n8n-v${{ steps.latest.outputs.latest_version }}"
          fi
          
          # Check if branch exists on remote
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME exists on remote, checking it out..."
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" origin/"$BRANCH_NAME"
          else
            echo "Creating new branch $BRANCH_NAME..."
            git checkout -b "$BRANCH_NAME"
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Update config.yaml
        if: steps.compare.outputs.needs_upgrade == 'true' && steps.compare.outputs.is_new_version == 'true'
        run: |
          # Update version in config.yaml with new addon version
          sed -i "s/^version: .*/version: \"${{ steps.addon_version.outputs.new_addon_version }}\"/" n8n/config.yaml
          echo "Updated config.yaml version to ${{ steps.addon_version.outputs.new_addon_version }}"

      - name: Update Dockerfile
        if: steps.compare.outputs.needs_upgrade == 'true' && steps.compare.outputs.is_new_version == 'true'
        run: |
          # Update version in Dockerfile
          sed -i "s/npm install -g n8n@.*/npm install -g n8n@${{ steps.latest.outputs.latest_version }}/" n8n/Dockerfile
          echo "Updated Dockerfile version to ${{ steps.latest.outputs.latest_version }}"

      - name: Commit changes
        if: steps.compare.outputs.needs_upgrade == 'true' && steps.compare.outputs.is_new_version == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add n8n/config.yaml n8n/Dockerfile
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit - n8n version is already up to date on this branch"
            exit 0
          fi
          
          git commit -m "⬆️ Upgrade n8n to ${{ steps.latest.outputs.latest_version }} (addon ${{ steps.addon_version.outputs.new_addon_version }})"

      - name: Push branch
        if: steps.compare.outputs.needs_upgrade == 'true' && steps.compare.outputs.is_new_version == 'true'
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"
          
          # Check if there are commits to push (avoids error when no changes)
          if git diff --quiet HEAD origin/"$BRANCH_NAME" 2>/dev/null || [ -z "$(git log origin/"$BRANCH_NAME"..HEAD 2>/dev/null)" ]; then
            echo "No new commits to push - branch is up to date"
            exit 0
          fi
          
          # Check if branch exists on remote
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME exists on remote, force-pushing updates..."
            # Fetch the remote branch to avoid stale info error
            git fetch origin "$BRANCH_NAME" || true
            git push origin "$BRANCH_NAME" --force
          else
            echo "Creating new branch $BRANCH_NAME..."
            git push origin "$BRANCH_NAME"
          fi

      - name: Setup GitHub CLI
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Install GitHub CLI
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
          
          # Authenticate
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          
          # Verify installation
          gh --version

      - name: Create or Update Pull Request
        if: steps.compare.outputs.needs_upgrade == 'true'
        run: |
          # Debug: show current branch and repo info
          echo "Current branch: $(git branch --show-current)"
          echo "Remote URL: $(git remote get-url origin)"
          
          LATEST_VERSION="${{ steps.latest.outputs.latest_version }}"
          NEW_ADDON_VERSION="${{ steps.addon_version.outputs.new_addon_version }}"
          RELEASE_TYPE="${{ steps.latest.outputs.release_type }}"
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"
          IS_NEW_VERSION="${{ steps.compare.outputs.is_new_version }}"
          
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --base main --json number --jq '.[0].number')
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating labels..."
            
            # Get current labels
            CURRENT_LABELS=$(gh pr view "$EXISTING_PR" --json labels --jq '.labels[].name')
            echo "Current labels: $CURRENT_LABELS"
            
            # Build new labels: keep auto-upgrade and dependencies, remove old release type labels, add new one
            NEW_LABELS="auto-upgrade,dependencies"
            
            # Check if PR has pre-release or latest label and needs update
            if echo "$CURRENT_LABELS" | grep -q "pre-release\|latest"; then
              # Remove old release type and add new one
              gh pr edit "$EXISTING_PR" --remove-label "pre-release,latest" 2>/dev/null || true
            fi
            
            # Add the correct release type label
            gh pr edit "$EXISTING_PR" --add-label "$RELEASE_TYPE"
            
            # Update title if needed (only for new versions)
            if [ "$IS_NEW_VERSION" = "true" ]; then
              CURRENT_TITLE=$(gh pr view "$EXISTING_PR" --json title --jq '.title')
              NEW_TITLE="⬆️ n8n $LATEST_VERSION (addon $NEW_ADDON_VERSION)"
              if [ "$CURRENT_TITLE" != "$NEW_TITLE" ]; then
                gh pr edit "$EXISTING_PR" --title "$NEW_TITLE"
                echo "Updated PR title to: $NEW_TITLE"
              fi
            fi
            
            echo "PR #$EXISTING_PR updated successfully"
          elif [ "$IS_NEW_VERSION" = "true" ]; then
            # Create pull request using gh CLI (only for new versions)
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "⬆️ n8n $LATEST_VERSION (addon $NEW_ADDON_VERSION)" \
              --body "Auto-upgrade n8n to version $LATEST_VERSION

            **Changes:**
            - Updated config.yaml addon version to $NEW_ADDON_VERSION
            - Updated Dockerfile to use n8n@$LATEST_VERSION

            **Release:** ${{ steps.latest.outputs.release_url }}

            This PR was created automatically by the auto-upgrade workflow." \
              --label "auto-upgrade,dependencies,$RELEASE_TYPE"
            
            echo "PR created successfully"
          else
            echo "No new version and no existing PR - nothing to do"
          fi
