name: Builder

on:
  workflow_call:
  push:
    branches:
      - main
      - master
    paths:
      - "**/config.*"
      - "**/Dockerfile"
      - "**/build.yaml"

env:
  BUILD_ARGS: ""

jobs:
  # 1. Detect which add-on folders changed
  detect-changed-addons:
    if: ${{ github.repository_owner == 'LeGitHubDeTai' && !contains(github.event.head_commit.message, 'nobuild') }}
    runs-on: ubuntu-latest
    outputs:
      changedAddons: ${{ steps.find_addons.outputs.changed_addons }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Find changed addon directories
        id: find_addons
        run: |
          git fetch origin "${{ github.event.before }}" || true
          changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
          echo "Changed files: $changed_files"
          
          # Créer un tableau JSON pour les addons modifiés
          changed_addons="["
          first=true
          for file in $changed_files; do
            if [[ "$file" =~ ^[^/]+/ ]] && [ -d "$(dirname "$file")" ]; then
              addon=$(dirname "$file")
              if [ -f "$addon/config.yaml" ] || [ -f "$addon/config.json" ]; then
                if [ "$first" = true ]; then
                  changed_addons="$changed_addons\"$addon\""
                  first=false
                else
                  changed_addons="$changed_addons,\"$addon\""
                fi
              fi
            fi
          done
          changed_addons="$changed_addons]"
          
          echo "Changed addons: $changed_addons"
          echo "changed_addons=$changed_addons" >> "$GITHUB_OUTPUT"

  # 2. Build images for changed addons/arches
  build:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: detect-changed-addons
    runs-on: ubuntu-latest
    environment: production
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      fail-fast: false
      matrix:
        addon: [mopidy, n8n, obsidian, planka, syncthing, dolibarr, FossFLOW]
        arch: ["aarch64", "amd64", "armv7", "armhf", "i386"]
    steps:
      - name: Check if addon should be built
        id: should_build
        run: |
          if [[ "${{ needs.detect-changed-addons.outputs.changedAddons }}" == *"${{ matrix.addon }}"* ]]; then
            echo "Addon ${{ matrix.addon }} should be built"
            echo "::set-output name=build::true"
          else
            echo "Addon ${{ matrix.addon }} not in changed list, skipping"
            echo "::set-output name=build::false"
          fi
      
      - uses: actions/checkout@v4
        if: steps.should_build.outputs.build == 'true'
      
      - name: Get information
        id: info
        if: steps.should_build.outputs.build == 'true'
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"
      
      - name: Check if Dockerfile exists
        id: dockerfile_check
        if: steps.should_build.outputs.build == 'true'
        run: |
          if [ -f "./${{ matrix.addon }}/Dockerfile" ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Dockerfile found in ${{ matrix.addon }}, skipping build."
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Check if add-on should be built for arch
        id: arch_check
        if: steps.should_build.outputs.build == 'true'
        env:
          HEAD: "${{ github.head_ref }}"
        run: |
          # Vérifier si l'architecture est supportée par HA Builder
          case "${{ matrix.arch }}" in
            "amd64"|"aarch64")
              builder_supported=true
              ;;
            *)
              builder_supported=false
              echo "Architecture ${{ matrix.arch }} non supportée par HA Builder, utilisation de buildx manuel"
              ;;
          esac
          
          # Vérifier si l'architecture est dans la liste de l'addon
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
             echo "arch_supported=true" >> "$GITHUB_OUTPUT";
             echo "builder_supported=$builder_supported" >> "$GITHUB_OUTPUT";
             echo "image=$(echo "${{ steps.info.outputs.image }}" | cut -d'/' -f3)" >> "$GITHUB_OUTPUT";
             if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                 echo "BUILD_ARGS=--test" >> "$GITHUB_ENV";
             fi
          else
             echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
             echo "arch_supported=false" >> "$GITHUB_OUTPUT";
          fi
      
      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test' && steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build ${{ matrix.addon }} add-on (HA Builder)
        id: builderstep
        if: steps.arch_check.outputs.arch_supported == 'true' && steps.arch_check.outputs.builder_supported == 'true' && steps.dockerfile_check.outputs.has_dockerfile == 'true' && steps.should_build.outputs.build == 'true'
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target "/data/${{ matrix.addon }}" \
            --image "${{ matrix.addon }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}/ha_addons" \
            --addon
      
      - name: Build ${{ matrix.addon }} add-on (Docker Buildx)
        if: steps.arch_check.outputs.arch_supported == 'true' && steps.arch_check.outputs.builder_supported == 'false' && steps.dockerfile_check.outputs.has_dockerfile == 'true' && steps.should_build.outputs.build == 'true'
        run: |
          echo "Build avec Docker Buildx pour ${{ matrix.arch }} (non supporté par HA Builder)"
          
          # Récupérer la version depuis config.yaml
          if [ -f "${{ matrix.addon }}/config.yaml" ]; then
            version=$(grep '^version:' "${{ matrix.addon }}/config.yaml" | sed 's/version: "//' | sed 's/"//' | tr -d '\r\n' || echo "latest")
          else
            version="latest"
          fi
          
          # Récupérer l'image de base depuis build.yaml si disponible
          if [ -f "${{ matrix.addon }}/build.yaml" ]; then
            base_image=$(grep "${{ matrix.arch }}:" "${{ matrix.addon }}/build.yaml" | sed 's/^[^:]*:\s*//' | sed 's/^"//' | sed 's/"$//' | tr -d '\r\n' | tr -d '"')
            if [ -z "$base_image" ]; then
              # Fallback vers une image de base par défaut
              case "${{ matrix.arch }}" in
                "armv7") base_image="ghcr.io/home-assistant/armv7-base:3.18" ;;
                "armhf") base_image="ghcr.io/home-assistant/armhf-base:3.18" ;;
                "i386") base_image="ghcr.io/home-assistant/i386-base:3.18" ;;
                *) base_image="ghcr.io/home-assistant/amd64-base:3.18" ;;
              esac
            fi
          else
            base_image="ghcr.io/home-assistant/amd64-base:3.18"
          fi
          
          echo "Image de base: $base_image"
          echo "Version: $version"
          
          # Convertir l'architecture pour Docker
          case "${{ matrix.arch }}" in
            "armv7") docker_arch="linux/arm/v7" ;;
            "armhf") docker_arch="linux/armhf" ;;
            "i386") docker_arch="linux/386" ;;
            *) docker_arch="linux/${{ matrix.arch }}" ;;
          esac
          
          # Construire avec buildx
          if docker buildx build \
            --platform "$docker_arch" \
            --push \
            --tag "ghcr.io/${{ github.repository_owner }}/ha_addons/${{ matrix.addon }}-${{ matrix.arch }}:$version" \
            --tag "ghcr.io/${{ github.repository_owner }}/ha_addons/${{ matrix.addon }}-${{ matrix.arch }}:latest" \
            --build-arg BUILD_FROM="$base_image" \
            --build-arg BUILD_VERSION="$version" \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max" \
            "./${{ matrix.addon}}"; then
            echo "✅ Build réussi pour ${{ matrix.addon }} (${{ matrix.arch }}) - $version"
          else
            echo "❌ Build échoué pour ${{ matrix.addon }} (${{ matrix.arch }})"
            exit 1
          fi

  # 3. Build Summary
  build-summary:
    if: always()
    needs: [detect-changed-addons, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate build summary
        run: |
          echo "# 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Addons traités" >> $GITHUB_STEP_SUMMARY
          
          addons="${{ needs.detect-changed-addons.outputs.changedAddons }}"
          if [ -n "$addons" ] && [ "$addons" != "[]" ]; then
            echo "$addons" | tr ',' '\n' | while read addon; do
              addon=$(echo "$addon" | sed 's/^ *//' | sed 's/ *$//' | sed 's/^"//' | sed 's/"$//')
              if [ -n "$addon" ]; then
                echo "- 📦 **$addon**" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "ℹ️ Aucun addon modifié dans ce push" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🏛️ Architectures supportées" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | Méthode | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| amd64 | HA Builder | ✅ Supportée |" >> $GITHUB_STEP_SUMMARY
          echo "| aarch64 | HA Builder | ✅ Supportée |" >> $GITHUB_STEP_SUMMARY
          echo "| armv7 | Docker Buildx | ⚡ Alternative |" >> $GITHUB_STEP_SUMMARY
          echo "| armhf | Docker Buildx | ⚡ Alternative |" >> $GITHUB_STEP_SUMMARY
          echo "| i386 | Docker Buildx | ⚡ Alternative |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Format des images" >> $GITHUB_STEP_SUMMARY
          echo "Les images sont créées avec le format :" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/legithubdetai/ha_addons/<addon>-<arch>:<version>" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/legithubdetai/ha_addons/<addon>-<arch>:latest" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
