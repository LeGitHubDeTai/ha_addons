[supervisord]
user=root
nodaemon=true
loglevel=info
logfile=/dev/stdout
logfile_maxbytes=0
logfile_backups=0
pidfile=/dev/null

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;" -c /etc/nginx/nginx.conf
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=root
priority=10

[program:planka]
command=/bin/sh -c "cd /app && ls -la /config/.env && echo '=== Loading env ===' && cat /config/.env && echo '=== Starting Planka ===' && export $(cat /config/.env | xargs) && node app.js --prod"
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=root
environment=NODE_ENV=production,PORT=1337
priority=20
