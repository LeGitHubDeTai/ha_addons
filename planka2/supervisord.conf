[supervisord]
user=root
nodaemon=true
loglevel=error
logfile=/dev/null
logfile_maxbytes=0
logfile_backups=0
pidfile=/dev/null

[program:planka]
command=/bin/sh -c "cd /app && /run.sh"
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=root
environment=NODE_ENV=production,PORT=1337
