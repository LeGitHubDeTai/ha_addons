[supervisord]
user=root
nodaemon=true
loglevel=info
logfile_maxbytes=1000000
logfile_backups=1

[program:planka]
command=/bin/sh -c "cd /app && chmod +x /scripts/run.sh && /scripts/run.sh"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
environment=NODE_ENV=production,PORT=1337
