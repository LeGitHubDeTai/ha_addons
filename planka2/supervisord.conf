[supervisord]
user=root
nodaemon=true
loglevel=info
logfile_maxbytes=1000000
logfile_backups=1

[program:planka]
command=/bin/sh -c "mkdir -p /data/user-avatars /data/project-background-images /data/attachments && chmod +x /scripts/run.sh && /scripts/run.sh"
autorestart=unexpected
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
environment=NODE_ENV=production,PORT=1337
