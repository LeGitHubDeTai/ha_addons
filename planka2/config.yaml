name: Planka2DEV
version: "26.4.2.13"
slug: planka2
panel_icon: "mdi:view-week"
description: Kanban board open-source (Planka)
url: https://github.com/LeGitHubDeTai/ha_addons/tree/main/planka
# image: ghcr.io/legithubdetai/ha_addons/dev-planka2-{arch}
stage: experimental
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 1338
ports:
    1337/tcp: 1337
ports_description:
    1337/tcp: WebUI
options:
    DATABASE:
      db_host: localhost
      db_port: 5432
      db_user: planka
      db_password: homeassistant
      db_name: planka
    ADMIN:
      email: admin@example.com
      password: homeassistant
      name: Admin
    INIT_DB: false
schema:
    DATABASE:
      db_host: str
      db_port: int
      db_user: str
      db_password: str
      db_name: str
    ADMIN:
      email: str
      password: password
      name: str
    INIT_DB: bool
map:
  - type: addon_config
    read_only: False
    path: /config
