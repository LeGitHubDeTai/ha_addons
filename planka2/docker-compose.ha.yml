# Docker-compose pour Home Assistant avec Planka officiel
version: '3.8'

services:
  planka:
    image: ghcr.io/plankanban/planka:latest
    restart: unless-stopped
    volumes:
      - /data/planka:/app/data
    ports:
      - "1337:1337"
    environment:
      - BASE_URL=http://localhost:1337
      - DATABASE_URL=postgresql://planka:homeassistant@postgres:5432/planka
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-64-chars-minimum}
      - TRUST_PROXY=true
      - NODE_ENV=production
      - PORT=1337
      - EXPLICIT_HOST=0.0.0.0
      
      # Création admin automatique
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-homeassistant}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME:-Admin}

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=homeassistant
    ports:
      - "5432:5432"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "1339:1339"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - planka
