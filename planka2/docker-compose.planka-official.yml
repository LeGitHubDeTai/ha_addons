# Docker-compose officiel Planka adapté pour Home Assistant
services:
  planka:
    image: ghcr.io/plankanban/planka:latest
    restart: on-failure
    volumes:
      - data:/app/data
    ports:
      - "1337:1337"
    environment:
      - BASE_URL=http://localhost:1337
      - DATABASE_URL=postgresql://postgres:homeassistant@postgres:5432/planka
      - SECRET_KEY=${SECRET_KEY:-notsecretkey}
      - TRUST_PROXY=true
      - NODE_ENV=production
      - PORT=1337
      - EXPLICIT_HOST=0.0.0.0
      
      # Admin user creation
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-homeassistant}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME:-Admin}

  postgres:
    image: postgres:15-alpine
    restart: on-failure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=homeassistant
    ports:
      - "5432:5432"

volumes:
  data:
  postgres_data:
