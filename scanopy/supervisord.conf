[supervisord]
user=root
nodaemon=true
loglevel=info
logfile_maxbytes=1000000
logfile_backups=1

[program:scanopy]
command=/bin/sh -c "mkdir -p /share/scanopy/scans /share/scanopy/db && chown -R scanopy:scanopy /share/scanopy && su-exec scanopy /app/server"
autorestart=unexpected
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
environment=PORT=8080,DATA_DIR=/share/scanopy

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
