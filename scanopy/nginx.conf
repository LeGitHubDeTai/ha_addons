events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Main server block
    server {
        listen 60072;

        # Serve static files from UI source directory
        location / {
            root /opt/scanopy-ui;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API proxy for daemon
        location /api/ {
            proxy_pass http://localhost:60075/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            set $ingress_path $http_x_ingress_path;

            sub_filter_types text/css application/javascript;
            sub_filter_once off;
            sub_filter 'href="/'  'href="$ingress_path/';
            sub_filter 'src="/'   'src="$ingress_path/';
            sub_filter 'action="/' 'action="$ingress_path/';
        }
    }
}
