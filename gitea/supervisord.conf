[supervisord]
user=root
nodaemon=true
loglevel=info
logfile_maxbytes=1000000
logfile_backups=1

[program:gitea]
command=/usr/bin/entrypoint
autorestart=unexpected
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=git
environment=USER=git,HOME=/data/git

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
