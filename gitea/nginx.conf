user root;
worker_processes auto;

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;

        location / {
            proxy_pass http://localhost:3000;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Origin $scheme://$host;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Allow large file uploads and API requests
            client_max_body_size 0;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # Ingress fix for URL rewriting (only for HTML content)
            set $ingress_path $http_x_ingress_path;

            sub_filter_types text/html text/css application/javascript;
            sub_filter_once off;
            sub_filter 'href="/'  'href="$ingress_path/';
            sub_filter 'src="/'   'src="$ingress_path/';
            sub_filter 'action="/' 'action="$ingress_path/';
            sub_filter 'url(/' 'url($ingress_path/';

            # Preserve query strings for API calls
            proxy_pass_request_headers on;
        }
    }
}
