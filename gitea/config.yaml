name: Gitea
version: "26.4.2.7"
slug: gitea
description: Gitea for Home Assistant
url: https://github.com/LeGitHubDeTai/ha_addons/tree/main/gitea
webui: "[PROTO:ssl]://[HOST]:[PORT:3000]"
image: ghcr.io/legithubdetai/ha_addons/dev-gitea-{arch}
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
ingress_stream: false
ports:
  22/tcp: 2222
  3000/tcp: 3000
ports_description:
  22/tcp: ssh
  3000/tcp: Web interface
map:
  - addon_config:rw
  - share:rw
  - ssl:rw
options:
  env_vars: []
  APP_NAME: Gitea for Homeassistant
  DOMAIN: homeassistant.local
  certfile: fullchain.pem
  keyfile: privkey.pem
  ssl: false
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  APP_NAME: str?
  DOMAIN: str?
  ROOT_URL: str?
  certfile: str
  keyfile: str
  ssl: bool
udev: true
devices:
  - /dev/dri
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/vchiq
  - /dev/video10
  - /dev/video11
  - /dev/video12
  - /dev/video13
  - /dev/video14
  - /dev/video15
  - /dev/video16
  - /dev/ttyUSB0
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme
  - /dev/nvme0
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/nvme2n1
  - /dev/nvme2n1p1
  - /dev/nvme2n1p2
  - /dev/nvme2n3p3
  - /dev/mmcblk
  - /dev/fuse
  - /dev/sda1
  - /dev/sdb1
  - /dev/sdc1
  - /dev/sdd1
  - /dev/sde1
  - /dev/sdf1
  - /dev/sdg1
  - /dev/sda2
  - /dev/sdb2
