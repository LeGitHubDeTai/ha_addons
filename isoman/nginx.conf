# -------------------
# NGINX CONFIGURATION
# -------------------
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    # Logs
    access_log /var/log/nginx/access.log;

    # ---- SERVER POUR ISOMAN + Ingress ----
    server {
        listen 50145;

        # Compression désactivée si besoin
        gzip off;

        # Catch-all location
        location / {
            proxy_pass http://127.0.0.1:8080;

            # WebSocket headers (essentiel)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers standard
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ingress fix pour sub_filter
            set $ingress_path $http_x_ingress_path;

            # Sub_filter pour corriger les chemins JS/CSS/HTML
            sub_filter_types text/html text/css application/javascript;
            sub_filter_once off;

            sub_filter 'href="/'  'href="$ingress_path/';
            sub_filter 'src="/'   'src="$ingress_path/';
            sub_filter 'action="/' 'action="$ingress_path/';
        }
    }
}
