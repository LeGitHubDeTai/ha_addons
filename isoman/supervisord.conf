[supervisord]
user=root
nodaemon=true
loglevel=info
logfile_maxbytes=1000000
logfile_backups=1

[program:isoman]
command=/entrypoint.sh ./server
autorestart=unexpected
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
user=root
environment=PORT=50145,DATA_DIR=/data,WORKER_COUNT=2,GIN_MODE=release
