[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:isoman-backend]
command=/usr/local/bin/isoman
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/isoman-backend.err.log
stdout_logfile=/var/log/supervisor/isoman-backend.out.log
user=root
environment=HOME="/data",USER="root"

[program:isoman-frontend]
command=/usr/local/bin/bun run dev --port 3000 --host 0.0.0.0
directory=/opt/isoman/ui
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/isoman-frontend.err.log
stdout_logfile=/var/log/supervisor/isoman-frontend.out.log
user=root
environment=HOME="/data",USER="root"
