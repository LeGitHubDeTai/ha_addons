[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:isoman]
command=/app/isoman-entrypoint.sh
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/isoman.err.log
stdout_logfile=/var/log/supervisor/isoman.out.log
user=root
environment=HOME="/data",USER="root"
