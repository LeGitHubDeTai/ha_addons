name: ISOMan
version: "26.3.1.31"
slug: isoman
panel_icon: "mdi:disc"
description: ISO management tool for downloading and managing ISO images with web interface
url: https://github.com/LeGitHubDeTai/ha_addons/tree/main/isoman
image: ghcr.io/legithubdetai/ha_addons/dev-isoman-{arch}
arch:
    - amd64
startup: application
boot: auto
hassio_role: "default"
ingress: true
ingress_port: 50145
ingress_stream: true
backup_exclude:
    - "isoman/.cache"
    - "isoman/.logs"
    - "supervisord.log*"
    - "/data/isos/*.tmp"
map:
    - ssl:ro
    - backup:rw
    - share:rw
    - media:rw
    - config:rw
ports:
    50145/tcp: 50145
ports_description:
    50145/tcp: The port for ISOMan web interface. Normally not exposed, as Home Assistant Ingress is more secure and is recommended. You may expose this port if you want to bypass Ingress (not recommended for security reasons).
options:
    env_vars_list: []
schema:
    env_vars_list: [
      "match(^[A-Z_0-9]+: .*$)"
    ]
